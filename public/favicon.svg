<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <style>
    .bg-oval {
      fill: #D2D2D2;
      opacity: 0.85;
      transition: fill 0.3s ease, opacity 0.3s ease;
    }
    .brand-text {
      fill: #890101;
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 24px;
      font-weight: bold;
      text-anchor: middle;
      dominant-baseline: middle;
      letter-spacing: 1px;
      transition: fill 0.3s ease;
    }
    @media (prefers-color-scheme: dark) {
      .bg-oval {
        fill: #890101;
        opacity: 1.0;
      }
      .brand-text {
        fill: #FFFFFF;
      }
    }
  </style>
  
  <!-- Tilted oval background -->
  <ellipse class="bg-oval" cx="48" cy="53" rx="38" ry="16" transform="rotate(-12 48 53)" />
  
  <!-- "PERRY" elegant serif text -->
  <text class="brand-text" x="50" y="55">PERRY</text>
</svg>
