<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perry Cera-Tech Ind. | Industrial Ceramic Excellence</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: '#890101',
            accent: '#000000',
            light: '#F8F8F8',
            industrial: '#E5E7EB',
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            serif: ['"Playfair Display"', 'serif'],
          }
        }
      }
    }
  </script>
  <style>
    body {
      scroll-behavior: smooth;
      -webkit-font-smoothing: antialiased;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }
    @keyframes slowSpin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes gridDrift {
      0% { background-position: 0% 0%; }
      100% { background-position: 100% 100%; }
    }
    .animate-float { animation: float 6s ease-in-out infinite; }
    .animate-slow-spin { animation: slowSpin 20s linear infinite; }
    .technical-grid {
      background-image: radial-gradient(circle, #e5e7eb 1px, transparent 1px);
      background-size: 30px 30px;
    }
    .dark .technical-grid {
      background-image: radial-gradient(circle, #374151 1px, transparent 1px);
    }
    .text-shadow-sm {
      text-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }
  </style>
<script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "lucide-react": "https://esm.sh/lucide-react@^0.574.0",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="bg-white text-black dark:bg-black dark:text-white font-sans transition-colors duration-300">
  <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
